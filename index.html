<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My File Converter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>My File Converter</h1>
        <p>Convert image, audio, and video files directly in your browser.</p>
      </header>

      <section class="card">
        <label class="field">
          <span>Input file</span>
          <input id="file-input" type="file" />
        </label>

        <div class="field inline">
          <span>Detected media type</span>
          <strong id="media-type">—</strong>
        </div>

        <label class="field">
          <span>Target format</span>
          <select id="target-format" disabled></select>
        </label>

        <label class="field">
          <span>Quality (image lossy formats)</span>
          <input id="quality" type="range" min="0.1" max="1" step="0.05" value="0.9" />
          <output id="quality-value">0.90</output>
        </label>

        <details class="field">
          <summary>Advanced fallback options</summary>
          <label class="checkbox">
            <input id="enable-wasm-fallback" type="checkbox" />
            Enable ffmpeg.wasm fallback (experimental)
          </label>
          <label class="field">
            <span>ffmpeg worker module URL</span>
            <input
              id="wasm-module-url"
              type="url"
              placeholder="https://cdn.example.com/ffmpeg-worker-module.js"
            />
            <small>
              This starter includes a worker scaffold only. You can wire your ffmpeg module URL here.
            </small>
          </label>
        </details>

        <button id="convert-btn" disabled>Convert</button>
      </section>

      <section class="card">
        <h2>Runtime support</h2>
        <pre id="support-output">Detecting support...</pre>
      </section>

      <section class="card">
        <h2>Status</h2>
        <p id="status">Select a file to begin.</p>
        <progress id="progress" value="0" max="1"></progress>
      </section>

      <section id="result-card" class="card hidden">
        <h2>Result</h2>
        <p id="result-meta"></p>
        <a id="download-link" download>Download converted file</a>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
