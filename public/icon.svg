<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="100" y1="140" x2="412" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="256" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>

  <!-- Top arrow: pointing right -->
  <line x1="128" y1="190" x2="332" y2="190" stroke="url(#arrow-grad)" stroke-width="42" stroke-linecap="round"/>
  <polyline points="292,148 352,190 292,232" stroke="url(#arrow-grad)" stroke-width="42" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom arrow: pointing left -->
  <line x1="384" y1="322" x2="180" y2="322" stroke="url(#arrow-grad)" stroke-width="42" stroke-linecap="round"/>
  <polyline points="220,280 160,322 220,364" stroke="url(#arrow-grad)" stroke-width="42" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
