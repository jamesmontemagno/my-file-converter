<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#081120"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="og-ag" x1="80" y1="180" x2="340" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="og-glow" cx="220" cy="315" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="og-text" x1="440" y1="240" x2="1100" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <circle cx="220" cy="315" r="200" fill="url(#og-glow)"/>

  <!-- Border accent -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#og-ag)"/>

  <!-- Icon (centered at 220, 315) -->
  <g transform="translate(110,205) scale(0.43)">
    <rect width="512" height="512" rx="96" fill="#1e293b" fill-opacity="0.6"/>
    <line x1="128" y1="190" x2="332" y2="190" stroke="url(#og-ag)" stroke-width="42" stroke-linecap="round"/>
    <polyline points="292,148 352,190 292,232" stroke="url(#og-ag)" stroke-width="42" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="384" y1="322" x2="180" y2="322" stroke="url(#og-ag)" stroke-width="42" stroke-linecap="round"/>
    <polyline points="220,280 160,322 220,364" stroke="url(#og-ag)" stroke-width="42" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- App name -->
  <text x="440" y="290" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="72" fill="url(#og-text)">LocalMorph</text>

  <!-- Tagline -->
  <text x="440" y="350" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="28" fill="#94a3b8">Convert files locally in your browser</text>

  <!-- Badges -->
  <text x="440" y="410" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="500" font-size="20" fill="#64748b">Private  ·  Fast  ·  Browser-native  ·  No uploads</text>
</svg>
